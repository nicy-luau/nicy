name: 🚀 Nicy CLI Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: 🏗️ Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: win-msvc-x64, target: x86_64-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-msvc-x86, target: i686-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-msvc-arm, target: aarch64-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-x64, target: x86_64-pc-windows-gnu, os: windows-latest }
          - { name: win-x86, target: i686-pc-windows-gnu, os: windows-latest }
          - { name: win-arm, target: aarch64-pc-windows-gnullvm, os: windows-latest, allow_failure: true }
          - { name: mac-x64, target: x86_64-apple-darwin, os: macos-latest }
          - { name: mac-arm, target: aarch64-apple-darwin, os: macos-latest }
          - { name: linux-x64, target: x86_64-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: linux-arm, target: aarch64-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: linux-x86, target: i686-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: android-arm, target: aarch64-linux-android, os: ubuntu-latest, use_cross: true }
          - { name: android-v7, target: armv7-linux-androideabi, os: ubuntu-latest, use_cross: true }

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🦀 Setup Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: 🎯 Install Target
        run: |
          $pureTarget = "${{ matrix.target }}".Split(".")[0]
          rustup target add $pureTarget
        shell: pwsh

      - name: 🗜️ Setup UPX
        if: runner.os != 'macOS'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: ⚡ Setup Zig
        if: ${{ !matrix.use_cross && !matrix.use_msvc }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: 📦 Install Tools
        run: |
          if ("${{ matrix.use_cross }}" -eq "true") {
            cargo install cross --git https://github.com/cross-rs/cross
          } elseif ("${{ matrix.use_msvc }}" -ne "true") {
            cargo install cargo-zigbuild
          }
        shell: pwsh

      - name: 🛠️ Build CLI
        run: |
          if ("${{ matrix.use_msvc }}" -eq "true") {
            cargo +nightly build --release --target ${{ matrix.target }} --manifest-path nightly/Cargo.toml --target-dir target -Z build-std=std,core,alloc,compiler_builtins,panic_abort
          } else {
            ./build.ps1 -target "${{ matrix.name }}" -toolchain nightly -force
          }
        shell: pwsh

      - name: 📂 Organize Artifacts
        run: |
          $cleanTarget = "${{ matrix.target }}".Replace(".2.17", "")
          $outDir = "target/$cleanTarget/release"
          mkdir -p dist

          if ("${{ matrix.name }}" -like "win-*") { $f = "nicy.exe" }
          else { $f = "nicy" }

          $ext = [System.IO.Path]::GetExtension($f)
          cp "$outDir/$f" "dist/nicy-${{ matrix.name }}$ext"
        shell: pwsh

      - name: 🚢 Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## 🚀 Nicy CLI - Release `${{ github.ref_name }}`

            ### 📋 Changelog
            - Standardized stable/nightly manifests using `nightly/Cargo.toml` for nightly-only features.
            - Standardized build pipeline with `build.ps1 -toolchain nightly -force` for GNU/Zig/Cross targets.
            - Added explicit MSVC nightly build path with `--manifest-path nightly/Cargo.toml`.
            - Added resilient Windows ARM GNU handling (`allow_failure`) and pinned Zig to `0.14.0`.

            ### 📂 Artifacts Guide
            - `win-msvc-*`: Native Windows MSVC builds.
            - `win-*`: Windows GNU builds.
            - `linux-*`: Compatible with GLIBC 2.17+.
            - `mac-* / android-*`: Unix and mobile targets.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
